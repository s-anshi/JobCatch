{% extends "base.html" %}
{% block title %}Login — JobCatch{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <i class="fas fa-briefcase auth-logo-icon"></i>
      <h1>Welcome Back</h1>
      <p>Log in to access your dashboard and resume history</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
      <div class="form-group">
        <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password"><i class="fas fa-lock"></i> Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
          <button type="button" class="toggle-password" onclick="togglePassword('password')">
            <i class="fas fa-eye" id="password-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}">Sign up free</a>
    </p>
  </div>
</div>
{% endblock %}
