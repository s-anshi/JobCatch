{% extends "base.html" %}
{% block title %}Register — JobCatch{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <i class="fas fa-user-plus auth-logo-icon"></i>
      <h1>Create Account</h1>
      <p>Join JobCatch and start your career journey today</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">
      <div class="form-group">
        <label for="name"><i class="fas fa-user"></i> Full Name</label>
        <input type="text" id="name" name="name" placeholder="Your full name" required autocomplete="name">
      </div>

      <div class="form-group">
        <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password"><i class="fas fa-lock"></i> Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" placeholder="Min. 6 characters" required>
          <button type="button" class="toggle-password" onclick="togglePassword('password')">
            <i class="fas fa-eye" id="password-eye"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm_password"><i class="fas fa-lock"></i> Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
      </div>

      <button type="submit" class="btn btn-primary btn-full">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>

    <p class="auth-footer">
      Already have an account?
      <a href="{{ url_for('auth.login') }}">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
